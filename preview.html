<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bolsa de Trabajo</title>
<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
h1 { color:#333; }
input, button { padding:8px; margin:5px; }
.card {
    background:white;
    margin:10px auto;
    padding:15px;
    width:300px;
    border-radius:10px;
    box-shadow:2px 2px 8px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>Ofertas de Empleo</h1>

<h3>Agregar nuevo empleo</h3>
<input type="text" id="titulo" placeholder="Título del empleo"><br>
<input type="text" id="empresa" placeholder="Empresa"><br>
<input type="text" id="sueldo" placeholder="Sueldo"><br>
<button onclick="agregarEmpleo()">Agregar Empleo</button>

<h3>Lista de empleos</h3>
<div id="listaEmpleos"></div>

<script>
// Función para agregar empleo
function agregarEmpleo() {
    const titulo = document.getElementById("titulo").value;
    const empresa = document.getElementById("empresa").value;
    const sueldo = document.getElementById("sueldo").value;

    if(!titulo || !empresa || !sueldo){
        alert("Por favor completa todos los campos");
        return;
    }

    let empleos = JSON.parse(localStorage.getItem("empleos")) || [];
    empleos.push({titulo, empresa, sueldo});
    localStorage.setItem("empleos", JSON.stringify(empleos));

    document.getElementById("titulo").value = "";
    document.getElementById("empresa").value = "";
    document.getElementById("sueldo").value = "";

    mostrarEmpleos();
}

// Función para mostrar los empleos
function mostrarEmpleos() {
    const lista = document.getElementById("listaEmpleos");
    lista.innerHTML = "";
    const empleos = JSON.parse(localStorage.getItem("empleos")) || [];

    empleos.forEach(e => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h3>${e.titulo}</h3><p>Empresa: ${e.empresa}</p><p>Sueldo: ${e.sueldo}</p>`;
        lista.appendChild(div);
    });
}

// Mostrar empleos al cargar la página
mostrarEmpleos();
</script>

</body>
</html>
