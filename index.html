<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bolsa de Trabajo</title>
<style>
body {
    font-family: Arial;
    background-color: #f4f4f4;
    text-align: center;
}
h1 {
    color: #333;
}
.card {
    background-color: white;
    margin: 15px auto;
    padding: 15px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>Ofertas de Empleo</h1>

<div class="card">
    <h3>Vendedor</h3>
    <p>Empresa: Tienda XYZ</p>
    <p>Sueldo: $8,000</p>
</div>

<div class="card">
    <h3>Programador</h3>
    <p>Empresa: Tech SA</p>
    <p>Sueldo: $15,000</p>
</div>

</body>
</html>
